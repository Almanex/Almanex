name: generate animation

on:
  # Запуск каждые 24 часа
  schedule:
    - cron: "0 0 * * *" 
  
  # Возможность запустить вручную
  workflow_dispatch:
  
  # Запуск при каждом пуше в main или master
  push:
    branches:
    - main
    - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate-snake-game-out-svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FFFF00&color_dots=#161b22,#ffb8ae,#ff0000,#00ffff,#ffb852

      - name: push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
